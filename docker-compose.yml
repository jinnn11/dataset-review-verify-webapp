services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: review_db
      POSTGRES_USER: review
      POSTGRES_PASSWORD: review
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review -d review_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://review:review@postgres:5432/review_db
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret}
      SESSION_COOKIE_SECURE: "true"
      ENABLE_SOFT_DELETE: ${ENABLE_SOFT_DELETE:-false}
      AUTO_INGEST_ON_STARTUP: ${AUTO_INGEST_ON_STARTUP:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-admin-password}
      APP_CONFIG_PATH: /app/app_config.yaml
    volumes:
      - ./data:/data
      - ./app_config.yaml:/app/app_config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
